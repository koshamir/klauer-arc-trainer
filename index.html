<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Klauer ARC Trainer</title><style>
body{margin:0;background:#0f1115;color:#e6edf3;font:14px Arial}header{padding:12px 16px;border-bottom:1px solid #2b3240}h1{margin:0}header p{margin:4px 0 0;color:#9aa4b2}.app{display:grid;grid-template-columns:240px 1fr 380px;gap:10px;padding:10px;height:calc(100vh - 76px)}.p{background:#171c24;border:1px solid #303848;border-radius:8px;padding:10px;overflow:auto}
button,select,input,textarea{background:#111722;color:#e6edf3;border:1px solid #3a4252;border-radius:6px;padding:6px}button{cursor:pointer}.nav button{display:block;width:100%;margin:0 0 6px;text-align:left}.a{border-color:#4ea1ff}.row{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin:6px 0}.small{color:#aab4c2;font-size:12px}.grid{display:inline-grid;gap:1px;background:#232a35;padding:2px;border:1px solid #515b6e}.cell{width:18px;height:18px}.io{display:grid;grid-template-columns:1fr auto 1fr;gap:6px;align-items:center;border:1px solid #2f3848;padding:6px;border-radius:6px;margin:6px 0}.card{border:1px solid #2f3848;border-radius:6px;padding:6px;margin:6px 0}.sw{width:22px;height:22px;border:2px solid #666;display:inline-block}.sel{outline:2px solid #fff}.ok{color:#2fbf71}.bad{color:#ff6b6b}
</style></head><body><header><h1>Klauer ARC Trainer</h1><p>Adult Klauer/Phye inductive reasoning training using ARC-AGI</p></header><div class='app'><aside class='p nav' id='nav'></aside><main class='p' id='main'></main><section class='p' id='side'></section></div>
<script>
const C=['#000','#0074D9','#FF4136','#2ECC40','#FFDC00','#AAA','#F012BE','#FF851B','#7FDBFF','#870C25'];
const MODES=[['generalization','Generalization','Attributes','Similarity'],['discrimination','Discrimination','Attributes','Difference'],['cross','Cross-classification','Attributes','Similarity + Difference'],['recognize','Recognizing relationships','Relations','Similarity'],['differentiate','Differentiating relationships','Relations','Difference'],['system','System construction','Relations','Similarity + Difference']];
const ERR=['surface-feature trap','ignored relevant attribute','ignored relevant relation','overgeneralized rule','undergeneralized rule','failed to test all examples','wrong output construction','working memory overload','other'];
const demo={id:'demo',source:'embedded',train:[{input:[[0,1,0],[0,1,0],[0,0,0]],output:[[0,2,0],[0,2,0],[0,0,0]]},{input:[[1,1,0],[0,0,0],[0,0,0]],output:[[2,2,0],[0,0,0],[0,0,0]]}],test:[{input:[[0,0,1],[0,1,1],[0,0,0]],output:[[0,0,2],[0,2,2],[0,0,0]]},{input:[[1,0,0],[1,1,0],[0,0,0]],output:[[2,0,0],[2,2,0],[0,0,0]]}]};
const S={tasks:[demo],task:0,testIdx:0,mode:'generalization',editor:{grid:[[0]],color:1,checks:0},lastFeedback:{},journal:JSON.parse(localStorage.journal||'[]'),perMode:{},gen:{} };
for(const [k] of MODES)S.perMode[k]=JSON.parse(localStorage['pm_'+k]||'{"level":1,"obj":[],"streak":0,"fail":0}');
const el=id=>document.getElementById(id),cur=()=>S.tasks[S.task],tcase=()=>cur().test[S.testIdx]||cur().test[0];
const proto="1) compare items/pairs 2) list similarities 3) list differences 4) generate rule hypothesis 5) test against all examples 6) revise if counterexample found 7) record error type";
function save(){localStorage.journal=JSON.stringify(S.journal);for(const [k] of MODES)localStorage['pm_'+k[0]]=JSON.stringify(S.perMode[k[0]]);} 
function ghtml(g,e=false){let h=`<div class='grid' style='grid-template-columns:repeat(${g[0].length},18px)' ${e?"id='edgrid'":''}>`;for(let r=0;r<g.length;r++)for(let c=0;c<g[0].length;c++)h+=`<div class='cell' ${e?`data-r='${r}' data-c='${c}'`:''} style='background:${C[g[r][c]]}'></div>`;return h+'</div>'}
function io(p){return `<div class='io'>${ghtml(p.input)}<div>→</div>${ghtml(p.output)}</div>`}
function mkMini(type,n=5){const g=Array.from({length:n},()=>Array(n).fill(0));let inG=JSON.parse(JSON.stringify(g)),out=JSON.parse(JSON.stringify(g));if(type==='objColor'){for(let i=1;i<4;i++){inG[2][i]=2;out[2][i]=4}}if(type==='objMove'){for(let i=1;i<4;i++){inG[1][i]=2;out[3][i]=2}}if(type==='pixColor'){inG[2][2]=3;out[2][2]=6}if(type==='pixMove'){inG[1][1]=3;out[3][3]=3}
if(type==='recolor'){inG[2][1]=2;inG[2][2]=2;out[2][1]=5;out[2][2]=5}
if(type==='move'){inG[1][1]=2;inG[1][2]=2;out[3][2]=2;out[3][3]=2}
if(type==='copy'){inG[1][1]=2;out[1][1]=2;out[3][3]=2}
if(type==='mirror'){inG[1][1]=2;inG[2][1]=2;out[1][3]=2;out[2][3]=2}
if(type==='rotate'){inG[1][1]=2;inG[1][2]=2;out[1][1]=2;out[2][1]=2}
if(type==='scale'){inG[2][2]=2;out[2][2]=2;out[2][3]=2;out[3][2]=2;out[3][3]=2}
if(type==='fill'){inG[1][1]=2;inG[1][3]=2;out[1][1]=2;out[1][2]=2;out[1][3]=2}
if(type==='count'){inG[1][1]=2;inG[3][3]=2;out[0][0]=2;out[0][1]=2}
return {input:inG,output:out};}
function updateDifficulty(mode,correct){if(correct===null)return;const d=S.perMode[mode];d.obj.push(correct);if(d.obj.length>20)d.obj.shift();d.streak=correct?d.streak+1:0;d.fail=correct?0:d.fail+1;if(d.streak>=3&&d.level<10){d.level++;d.streak=0}if(d.fail>=2&&d.level>1){d.level--;d.fail=0}}
function addEntry({correct,objective,explain,meta}){const mode=S.mode,pm=S.perMode[mode],rt=Date.now()-S.started;const et=el('errType')?.value||'other';const notes=el('errNotes')?.value||'';S.journal.unshift({timestamp:new Date().toISOString(),mode,taskId:cur().id||null,objective,correct,responseMs:rt,errorType:et,notes,explain,meta});if(S.journal.length>800)S.journal.pop();updateDifficulty(mode,correct);save();}
function startMode(){S.started=Date.now();if(S.mode==='system'){const ti=tcase().input;S.editor.grid=(S.perMode.system.level<=3?ti.map(r=>[...r]):Array.from({length:ti.length},()=>Array(ti[0].length).fill(0)));S.editor.checks=0;}if(S.mode==='cross')genCross();if(S.mode==='differentiate')genDiffRel();if(S.mode==='recognize')genRelMini();if(S.mode==='discrimination')genDisc();}
function genCross(){S.gen.cross=['objColor','objMove','pixColor','pixMove'].map(t=>({pair:mkMini(t,4+Math.min(4,Math.floor(S.perMode.cross.level/2))),ans:t,choice:''}));}
function genRelMini(){const types=['recolor','move','copy','mirror','rotate','scale','fill','count'];const a=types[Math.floor(Math.random()*types.length)];S.gen.rel={type:a,pair:mkMini(a,4+Math.floor(S.perMode.recognize.level/2))};}
function genDiffRel(){const types=['recolor','move','copy','mirror','rotate','scale','fill','count'];const shared=types[Math.floor(Math.random()*types.length)];let odd=shared;while(odd===shared)odd=types[Math.floor(Math.random()*types.length)];const cards=[shared,shared,shared,odd].sort(()=>Math.random()-.5);S.gen.drel={shared,odd,oddIdx:cards.indexOf(odd),cards:cards.map(t=>mkMini(t,4+Math.floor(S.perMode.differentiate.level/2)))};}
function corrupt(p){const out=JSON.parse(JSON.stringify(p.output));const cells=[];for(let r=0;r<out.length;r++)for(let c=0;c<out[0].length;c++)cells.push([r,c]);const nz=cells.filter(([r,c])=>out[r][c]!==0),z=cells.filter(([r,c])=>out[r][c]===0);
const types=['wrong color','missing cell/object','extra cell/object','wrong position'];let type=types[Math.floor(Math.random()*types.length)],msg='';if(type==='wrong color'&&nz.length){const [r,c]=nz[Math.floor(Math.random()*nz.length)];const old=out[r][c];out[r][c]=(old+1)%10;msg=`cell (${r},${c}) color ${old}->${out[r][c]}`;}
else if(type==='missing cell/object'&&nz.length){const [r,c]=nz[Math.floor(Math.random()*nz.length)];out[r][c]=0;msg=`removed cell at (${r},${c})`;}
else if(type==='extra cell/object'&&z.length){const [r,c]=z[Math.floor(Math.random()*z.length)];out[r][c]=1+Math.floor(Math.random()*9);msg=`added extra cell at (${r},${c})`;}
else {const a=nz[0],b=z[0]||[0,0];if(a){out[b[0]][b[1]]=out[a[0]][a[1]];out[a[0]][a[1]]=0;msg=`moved one cell from (${a[0]},${a[1]}) to (${b[0]},${b[1]})`;type='wrong position';}}
return {output:out,meta:{type,detail:msg}}}
function genDisc(){let pairs=cur().train.slice(0,4).map(p=>({input:p.input,output:p.output,ok:true}));if(pairs.length<3)pairs=[mkMini('objColor',5),mkMini('objColor',5),mkMini('objColor',5)].map(p=>({...p,ok:true,fallback:true}));const bad=Math.floor(Math.random()*pairs.length);const c=corrupt(pairs[bad]);pairs[bad]={input:pairs[bad].input,output:c.output,ok:false,meta:c.meta};S.gen.disc={pairs,bad,meta:c.meta};}
function render(){el('nav').innerHTML=MODES.map(([k,n])=>`<button class='${S.mode===k?'a':''}' data-m='${k}'>${n}</button>`).join('');document.querySelectorAll('#nav button').forEach(b=>b.onclick=()=>{S.mode=b.dataset.m;startMode();render()});
const t=cur();el('main').innerHTML=`<div class='row'><input id='f' type='file' multiple accept='.json'><input id='d' type='file' webkitdirectory multiple><button id='imp'>Import</button><button id='prev'>Prev</button><button id='next'>Next</button><button id='rand'>Random</button><select id='taskSel'>${S.tasks.map((x,i)=>`<option value='${i}' ${i===S.task?'selected':''}>${x.id||('task-'+i)}</option>`).join('')}</select></div><div class='row'>Task id: <b>${t.id||('task-'+S.task)}</b> | Loaded: ${S.tasks.length} | Test case: <select id='testSel'>${t.test.map((_,i)=>`<option ${i===S.testIdx?'selected':''}>${i}</option>`).join('')}</select></div><div class='small'>ARC conceptual rule may be unknown; objective ARC correctness is exact output-grid equality only.</div>${t.train.map((p,i)=>`<div><b>Train ${i+1}</b>${io(p)}</div>`).join('')}<div><b>Selected test input</b>${ghtml(tcase().input)}</div>${modeHtml()}`;
bindTop();bindMode();renderSide();}
function modeHtml(){const fb=S.lastFeedback[S.mode]||'';if(S.mode==='generalization')return `<h3>Generalization</h3>${['relevant objects','relevant attributes','relation/transformation hypothesis','ignored/irrelevant attributes','predicted test output description','how hypothesis was tested against every train example'].map((x,i)=>`<div class='small'>${x}</div><textarea id='g${i}' rows='2' style='width:100%'></textarea>`).join('')}<button id='subG'>Submit self-explanation</button><div>${fb}</div>`;
if(S.mode==='discrimination'){const d=S.gen.disc;return `<h3>Discrimination</h3><p>Identify output violating shared attribute pattern.</p>${d.pairs.map((p,i)=>`<label class='card'><input type='radio' name='disc' value='${i}'> Card ${i+1}${io(p)}</label>`).join('')}<button id='chkD'>Check</button><div>${fb}</div>`;}
if(S.mode==='cross'){const opts={'objColor':'object + color','objMove':'object + spatial','pixColor':'pixel + color','pixMove':'pixel + spatial'};return `<h3>Cross-classification</h3><p>Classify each transformation by both axes.</p>${S.gen.cross.map((c,i)=>`<div class='card'>Card ${i+1}${io(c.pair)}<select id='cc${i}'><option value=''>select...</option>${Object.values(opts).map(o=>`<option>${o}</option>`).join('')}</select></div>`).join('')}<button id='chkC'>Check</button><div>${fb}</div>`;}
if(S.mode==='recognize'){const rel=['recolor','move','copy','crop/extract','complete/fill','count','mirror/rotate','scale/expand','unknown/compound'];return `<h3>Recognizing relationships</h3><div class='row'><label><input type='radio' name='rmode' value='arc' checked> ARC hypothesis (not graded)</label><label><input type='radio' name='rmode' value='gen'> Generated known-answer</label></div><div id='rzone'></div><button id='subR'>Submit</button><div>${fb}</div>`;}
if(S.mode==='differentiate'){return `<h3>Differentiating relationships</h3><p>Select odd relation card (grids only).</p>${S.gen.drel.cards.map((p,i)=>`<label class='card'><input type='radio' name='dr' value='${i}'> Card ${i+1}${io(p)}</label>`).join('')}<button id='chkDR'>Check</button><div>${fb}</div>`;}
return `<h3>System construction</h3><div class='row'>${C.map((c,i)=>`<span class='sw ${S.editor.color===i?'sel':''}' data-col='${i}' style='background:${c}'></span>`).join('')}</div><div class='row'><button id='cpyIn'>Copy test input</button><button id='clr'>Clear</button><button id='rz'>Resize</button>R<input id='rr' type='number' value='${S.editor.grid.length}' min='1' max='30'>C<input id='rc' type='number' value='${S.editor.grid[0].length}' min='1' max='30'><button id='chkS'>Check exact</button>${S.editor.checks>0?"<button id='rev'>Reveal expected output</button>":''}</div>${ghtml(S.editor.grid,true)}<div>${fb}</div>`}
function renderRecognizeZone(){const m=document.querySelector("input[name='rmode']:checked")?.value||'arc';const z=el('rzone');if(!z)return;if(m==='arc')z.innerHTML=`<div class='small'>ARC pair relation labeling practice (not objective).</div>${io(cur().train[0])}<select id='arcRel'>${['recolor','move','copy','crop/extract','complete/fill','count','mirror/rotate','scale/expand','unknown/compound'].map(x=>`<option>${x}</option>`).join('')}</select><textarea id='arcWhy' rows='3' style='width:100%' placeholder='Justify relation'></textarea>`;else z.innerHTML=`<div class='small'>Generated known-answer relation task (objective).</div>${io(S.gen.rel.pair)}<select id='genRel'>${['recolor','move','copy','mirror','rotate','scale','fill','count'].map(x=>`<option>${x}</option>`).join('')}</select>`;}
function bindTop(){el('imp').onclick=async()=>{let n=0;for(const f of [...el('f').files,...el('d').files]){if(!f.name.endsWith('.json'))continue;try{const j=JSON.parse(await f.text());if(j.train&&j.test){S.tasks.push({id:f.name,source:'import',...j});n++;}}catch{}}if(n){S.task=S.tasks.length-n;S.testIdx=0;startMode()}render()};el('prev').onclick=()=>{S.task=(S.task-1+S.tasks.length)%S.tasks.length;S.testIdx=0;startMode();render()};el('next').onclick=()=>{S.task=(S.task+1)%S.tasks.length;S.testIdx=0;startMode();render()};el('rand').onclick=()=>{S.task=Math.floor(Math.random()*S.tasks.length);S.testIdx=0;startMode();render()};el('taskSel').onchange=e=>{S.task=+e.target.value;S.testIdx=0;startMode();render()};el('testSel').onchange=e=>{S.testIdx=+e.target.value;if(S.mode==='system')startMode();render()};}
function bindMode(){if(S.mode==='generalization')el('subG').onclick=()=>{const fields=[0,1,2,3,4,5].map(i=>el('g'+i).value);addEntry({correct:null,objective:false,explain:{fields},meta:{kind:'self-explanation'}});S.lastFeedback.generalization="<div class='ok'>Saved.</div><div class='small'>Checklist: explain every train pair? specified relevant objects/attributes? distinguished irrelevant features? predicted test output? tested against all examples? revised after counterexample?</div>";render()};
if(S.mode==='discrimination')el('chkD').onclick=()=>{const v=[...document.querySelectorAll("input[name='disc']")].find(x=>x.checked);if(!v)return;const ok=+v.value===S.gen.disc.bad;addEntry({correct:ok,objective:true,explain:'discrimination choice',meta:S.gen.disc.meta});S.lastFeedback.discrimination=(ok?"<span class='ok'>Correct.</span>":"<span class='bad'>Incorrect.</span>")+` Corruption type: ${S.gen.disc.meta.type}; ${S.gen.disc.meta.detail}`;render()};
if(S.mode==='cross')el('chkC').onclick=()=>{const map={objColor:'object + color',objMove:'object + spatial',pixColor:'pixel + color',pixMove:'pixel + spatial'};let c=0;S.gen.cross.forEach((x,i)=>{if(el('cc'+i).value===map[x.ans])c++;});const ok=c===4;addEntry({correct:ok,objective:true,explain:'cross classification',meta:{score:c+'/4'}});S.lastFeedback.cross=(ok?"<span class='ok'>Correct.</span>":"<span class='bad'>Not fully correct.</span>")+" Explanation: compare whether change acts on an object vs single pixel, then whether color or position/geometry changes.";render()};
if(S.mode==='recognize'){document.querySelectorAll("input[name='rmode']").forEach(x=>x.onchange=renderRecognizeZone);renderRecognizeZone();el('subR').onclick=()=>{const m=document.querySelector("input[name='rmode']:checked").value;if(m==='arc'){addEntry({correct:null,objective:false,explain:{label:el('arcRel').value,why:el('arcWhy').value},meta:{submode:'arc'}});S.lastFeedback.recognize="<span class='ok'>Saved ARC hypothesis label.</span> Not graded because ARC conceptual rule is not assumed ground truth.";}else{const guess=el('genRel').value,ok=guess===S.gen.rel.type;addEntry({correct:ok,objective:true,explain:{guess},meta:{answer:S.gen.rel.type,submode:'generated'}});S.lastFeedback.recognize=(ok?"<span class='ok'>Correct.</span>":"<span class='bad'>Incorrect.</span>")+` Generated relation: ${S.gen.rel.type}.`; } render()};}
if(S.mode==='differentiate')el('chkDR').onclick=()=>{const v=[...document.querySelectorAll("input[name='dr']")].find(x=>x.checked);if(!v)return;const ok=+v.value===S.gen.drel.oddIdx;addEntry({correct:ok,objective:true,explain:'odd relation',meta:{shared:S.gen.drel.shared,odd:S.gen.drel.odd}});S.lastFeedback.differentiate=(ok?"<span class='ok'>Correct.</span>":"<span class='bad'>Incorrect.</span>")+` Shared relation: ${S.gen.drel.shared}; odd relation: ${S.gen.drel.odd}.`;render()};
if(S.mode==='system'){document.querySelectorAll('[data-col]').forEach(s=>s.onclick=()=>{S.editor.color=+s.dataset.col;render()});el('edgrid').onclick=e=>{const c=e.target.closest('.cell');if(!c)return;const r=+c.dataset.r,cc=+c.dataset.c;S.editor.grid[r][cc]=S.editor.color;render()};el('cpyIn').onclick=()=>{S.editor.grid=tcase().input.map(r=>[...r]);render()};el('clr').onclick=()=>{S.editor.grid=S.editor.grid.map(r=>r.map(()=>0));render()};el('rz').onclick=()=>{const r=+el('rr').value,c=+el('rc').value;S.editor.grid=Array.from({length:r},(_,ri)=>Array.from({length:c},(_,ci)=>S.editor.grid[ri]?.[ci]??0));render()};el('chkS').onclick=()=>{S.editor.checks++;const out=tcase().output,ok=out?JSON.stringify(out)===JSON.stringify(S.editor.grid):null;addEntry({correct:ok,objective:out!=null,explain:'manual construction',meta:{testIdx:S.testIdx}});S.lastFeedback.system=ok===null?"No output available.":ok?"<span class='ok'>Exact match.</span>":"<span class='bad'>Not exact.</span>";render()};if(el('rev'))el('rev').onclick=()=>{const out=tcase().output;if(out)S.editor.grid=out.map(r=>[...r]);render()};}
}
function renderSide(){const [_,n,b,c]=MODES.find(m=>m[0]===S.mode);const d=S.perMode[S.mode];const obj=d.obj.length,cor=d.obj.filter(Boolean).length;const params=`grid~${4+Math.floor(d.level/2)}, colors~${Math.min(6,2+Math.floor(d.level/2))}, objects~${1+Math.floor(d.level/3)}, corrupted cells~${Math.min(4,1+Math.floor(d.level/3))}, system start ${d.level<=3?'copied':'blank'}`;
const all=S.journal,tot=all.length,objA=all.filter(x=>x.objective).length,objC=all.filter(x=>x.objective&&x.correct===true).length,selfA=all.filter(x=>!x.objective).length;const errs={};all.forEach(x=>errs[x.errorType]=(errs[x.errorType]||0)+1);
const per=MODES.map(([k,n])=>{const a=all.filter(x=>x.mode===k),oa=a.filter(x=>x.objective),oc=oa.filter(x=>x.correct===true);return `${n}: attempts ${a.length}, objective acc ${oa.length?Math.round(oc.length/oa.length*100):'n/a'}%`}).join('<br>');
el('side').innerHTML=`<h3>Method panel</h3><div class='card'><b>${n}</b><div class='small'>Branch: ${b} | Comparison: ${c}</div><div class='small'>Exact Klauer operation: ${n}</div><div class='small'>Protocol: ${proto}</div></div><h3>Difficulty</h3><div class='small'>Level ${d.level}/10 | Objective acc ${obj?Math.round(cor/obj*100):0}%</div><div class='small'>Parameters: ${params}</div><h3>Error Journal</h3><div class='row'><select id='errType'>${ERR.map(e=>`<option>${e}</option>`).join('')}</select><input id='errNotes' placeholder='notes'></div><div class='row'><button id='clrJ'>Clear journal</button><button id='expJ'>Export JSON</button><button id='expC'>Export CSV</button></div><div class='small'>Entries: ${tot}</div><h3>Statistics</h3><div class='small'>Total attempts: ${tot}<br>Objective attempts: ${objA}<br>Objective correct: ${objC}<br>Self-explanation attempts: ${selfA}<br>Objective accuracy: ${objA?Math.round(objC/objA*100):0}%<br>${per}<br>Common errors: ${Object.entries(errs).sort((a,b)=>b[1]-a[1]).slice(0,4).map(x=>x[0]+'('+x[1]+')').join(', ')||'n/a'}</div>`;
el('clrJ').onclick=()=>{S.journal=[];save();render()};el('expJ').onclick=()=>download('journal.json',JSON.stringify(S.journal,null,2),'application/json');el('expC').onclick=()=>{const cols=['timestamp','mode','taskId','objective','correct','responseMs','errorType','notes','explain','meta'];const rows=S.journal.map(j=>cols.map(c=>JSON.stringify(typeof j[c]==='object'?JSON.stringify(j[c]):j[c]??'')).join(','));download('journal.csv',[cols.join(','),...rows].join('\n'),'text/csv')};}
function download(name,text,type){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([text],{type}));a.download=name;a.click();URL.revokeObjectURL(a.href)}
startMode();render();
</script></body></html>
