<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Klauer ARC Trainer</title>
<style>
:root{--bg:#0f1115;--panel:#171a21;--muted:#9aa4b2;--text:#e6edf3;--accent:#4ea1ff;--ok:#2fbf71;--bad:#ff6b6b;}
*{box-sizing:border-box}body{margin:0;font-family:Inter,Segoe UI,Arial,sans-serif;background:var(--bg);color:var(--text)}
header{padding:14px 18px;border-bottom:1px solid #2a2f3a;background:#11151c}h1{margin:0;font-size:1.4rem}header p{margin:.35rem 0 0;color:var(--muted)}
.app{display:grid;grid-template-columns:260px 1fr 360px;gap:12px;padding:12px;height:calc(100vh - 84px)}
.panel{background:var(--panel);border:1px solid #2a2f3a;border-radius:10px;padding:12px;overflow:auto}
button,select,input,textarea{background:#111722;color:var(--text);border:1px solid #394150;border-radius:7px;padding:8px}
button{cursor:pointer}button:hover{border-color:var(--accent)}
.nav button{display:block;width:100%;text-align:left;margin:0 0 8px}.nav button.active{border-color:var(--accent);background:#132238}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin:.45rem 0}.small{font-size:.88rem;color:var(--muted)}
.grid{display:inline-grid;gap:1px;background:#222;border:1px solid #555;padding:2px}.cell{width:18px;height:18px}
.io{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:center;margin:8px 0;padding:8px;border:1px solid #2a2f3a;border-radius:8px}
.card{border:1px solid #2a2f3a;border-radius:8px;padding:8px;margin:8px 0}
.palette{display:grid;grid-template-columns:repeat(10,24px);gap:6px}.sw{width:24px;height:24px;border:2px solid #666;cursor:pointer}.sw.sel{outline:2px solid #fff}
.stats dt{color:var(--muted)} .stats dd{margin:0 0 6px}
.success{color:var(--ok)}.error{color:var(--bad)}
</style>
</head>
<body>
<header><h1>Klauer ARC Trainer</h1><p>Adult Klauer/Phye inductive reasoning training using ARC-AGI</p></header>
<div class="app">
  <aside class="panel nav" id="nav"></aside>
  <main class="panel" id="workspace"></main>
  <section class="panel" id="side"></section>
</div>
<script>
const ARC_COLORS=['#000000','#0074D9','#FF4136','#2ECC40','#FFDC00','#AAAAAA','#F012BE','#FF851B','#7FDBFF','#870C25'];
const MODES=[
{key:'generalization',name:'Generalization',branch:'Attributes',cmp:'Similarity',train:'Find shared attributes and propose a rule that explains all train pairs.'},
{key:'discrimination',name:'Discrimination',branch:'Attributes',cmp:'Difference',train:'Detect which output differs from the shared attribute pattern.'},
{key:'cross',name:'Cross-classification',branch:'Attributes',cmp:'Similarity + Difference',train:'Classify transformations along two attribute axes.'},
{key:'recognize',name:'Recognizing relationships',branch:'Relations',cmp:'Similarity',train:'Label input-output relation type and justify your choice.'},
{key:'differentiate',name:'Differentiating relationships',branch:'Relations',cmp:'Difference',train:'Find the odd relation among mostly shared relation cards.'},
{key:'system',name:'System construction',branch:'Relations',cmp:'Similarity + Difference',train:'Construct test output and validate via exact grid equality.'}
];
const ERROR_TYPES=['surface-feature trap','ignored relevant attribute','ignored relevant relation','overgeneralized rule','undergeneralized rule','failed to test all examples','wrong output construction','working memory overload','other'];
const demo={id:'demo-task',source:'embedded',train:[{input:[[0,1,0],[0,1,0],[0,0,0]],output:[[0,2,0],[0,2,0],[0,0,0]]},{input:[[1,1,0],[0,0,0],[0,0,0]],output:[[2,2,0],[0,0,0],[0,0,0]]}],test:[{input:[[0,0,1],[0,1,1],[0,0,0]],output:[[0,0,2],[0,2,2],[0,0,0]]}]};
const S={tasks:[demo],idx:0,mode:'generalization',journal:JSON.parse(localStorage.getItem('klauerJournal')||'[]'),stats:JSON.parse(localStorage.getItem('klauerStats')||'{}'),diff:JSON.parse(localStorage.getItem('klauerDiff')||'{}'),editor:{grid:[[0,0,0],[0,0,0],[0,0,0]],color:2},sessionStart:Date.now()};
MODES.forEach(m=>{if(!S.diff[m.key])S.diff[m.key]={level:1,history:[],recentFailures:0,avgMs:0};if(!S.stats[m.key])S.stats[m.key]={attempts:0,correct:0}});
function save(){localStorage.setItem('klauerJournal',JSON.stringify(S.journal));localStorage.setItem('klauerStats',JSON.stringify(S.stats));localStorage.setItem('klauerDiff',JSON.stringify(S.diff));}
const el=id=>document.getElementById(id), task=()=>S.tasks[S.idx];
function renderGrid(g,editable=false){const wrap=document.createElement('div');wrap.className='grid';wrap.style.gridTemplateColumns=`repeat(${g[0]?.length||0},18px)`;g.forEach((r,ri)=>r.forEach((v,ci)=>{const c=document.createElement('div');c.className='cell';c.style.background=ARC_COLORS[v]||'#000';if(editable)c.onclick=()=>{g[ri][ci]=S.editor.color;render()};wrap.appendChild(c);}));return wrap}
function ioPair(p){const d=document.createElement('div');d.className='io';d.append(renderGrid(p.input),Object.assign(document.createElement('div'),{textContent:'→'}),renderGrid(p.output));return d}
function topControls(){return `<div class=row><input id=filePick type=file accept=.json multiple><input id=dirPick type=file webkitdirectory multiple><button id=loadBtn>Import Selected</button><button id=randBtn>Random Task</button></div><div class=small>Loaded tasks: ${S.tasks.length} | Current task: ${task().id||('task-'+S.idx)}</div>`}
function makeNav(){el('nav').innerHTML=MODES.map(m=>`<button data-m='${m.key}' class='${S.mode===m.key?'active':''}'>${m.name}</button>`).join('');el('nav').querySelectorAll('button').forEach(b=>b.onclick=()=>{S.mode=b.dataset.m;S.sessionStart=Date.now();if(S.mode==='system')initEditor();render();});}
function methodPanel(){const m=MODES.find(x=>x.key===S.mode),d=S.diff[S.mode];return `<h3>Method Panel</h3><div class=card><b>${m.name}</b><div class=small>Branch: ${m.branch}<br>Comparison: ${m.cmp}</div><p>${m.train}</p><p>Strategy: compare all train pairs, identify similarities/differences, state hypothesis, test against every example, monitor errors.</p></div><h3>Difficulty</h3><div class=small>Level ${d.level}/10 | Recent failures: ${d.recentFailures} | Avg response: ${(d.avgMs/1000||0).toFixed(1)}s</div>`}
function addJournal({correct,explain,errorType,notes}){const t=Date.now()-S.sessionStart,mode=S.mode;S.stats[mode].attempts++;if(correct===true)S.stats[mode].correct++;if(correct===false)S.diff[mode].recentFailures++;else S.diff[mode].recentFailures=Math.max(0,S.diff[mode].recentFailures-1);S.diff[mode].history.push(correct);if(S.diff[mode].history.length>20)S.diff[mode].history.shift();const acc=S.diff[mode].history.filter(v=>v===true).length/Math.max(1,S.diff[mode].history.filter(v=>v!==null).length);S.diff[mode].level=Math.min(10,Math.max(1,Math.round(1+acc*9-S.diff[mode].recentFailures*0.3)));S.diff[mode].avgMs=S.diff[mode].avgMs?Math.round((S.diff[mode].avgMs*0.8)+(t*0.2)):t;S.journal.unshift({timestamp:new Date().toISOString(),mode,taskId:task()?.id||null,correct,explain,errorType,notes});if(S.journal.length>500)S.journal.pop();save();}
function initEditor(){const ti=task()?.test?.[0]?.input||[[0]];const lvl=S.diff.system.level;S.editor.grid=(lvl<=3?ti.map(r=>[...r]):Array.from({length:ti.length},()=>Array(ti[0].length).fill(0)));}
function gridEq(a,b){if(!a||!b||a.length!==b.length||a[0].length!==b[0].length)return false;for(let r=0;r<a.length;r++)for(let c=0;c<a[0].length;c++)if(a[r][c]!==b[r][c])return false;return true}
function render(){makeNav();const t=task();el('side').innerHTML=methodPanel()+statsHtml()+journalHtml();el('workspace').innerHTML=topControls()+commonTaskHtml()+modeHtml();bindTop();bindMode();}
function commonTaskHtml(){const t=task();let h='<h3>ARC Task</h3><div class=small>Exact conceptual rule may be unknown; ARC checking is only exact by output-grid equality.</div>';t.train.forEach((p,i)=>h+=`<div><b>Train ${i+1}</b></div>`+ioWrap(p));h+='<div><b>Test input</b></div>'+gridWrap(t.test[0].input);return h}
const ioWrap=p=>`<div class=io-wrap>${nodeToHtml(ioPair(p))}</div>`,gridWrap=g=>`<div class=grid-wrap>${nodeToHtml(renderGrid(g))}</div>`;
function nodeToHtml(n){const d=document.createElement('div');d.appendChild(n);return d.innerHTML}
function modeHtml(){const t=task(),lvl=S.diff[S.mode].level;if(S.mode==='generalization')return `<h3>Generalization</h3><p>What common transformation/rule appears across all examples?</p><textarea id=hyp rows=4 style='width:100%' placeholder='State objects, relevant attributes, and transformation steps.'></textarea><button id=subGen>Submit hypothesis</button><div id=genOut class=small></div>`;
if(S.mode==='discrimination'){const ex=t.train.map((p,i)=>({i,p,corrupt:false}));const bad=Math.floor(Math.random()*ex.length);let corruptCells=Math.max(1,Math.min(4,Math.round(lvl/3)));const out=JSON.parse(JSON.stringify(ex[bad].p.output));for(let k=0;k<corruptCells;k++){const r=Math.floor(Math.random()*out.length),c=Math.floor(Math.random()*out[0].length);out[r][c]=(out[r][c]+1+Math.floor(Math.random()*9))%10;}ex[bad].p={input:ex[bad].p.input,output:out};ex[bad].corrupt=true;S.discAnswer=bad;return `<h3>Discrimination</h3><p>Which output violates the shared pattern? (difference of attributes)</p>`+ex.map((e,j)=>`<label class=card><input type=radio name=disc value=${j}> Pair ${j+1}${ioWrap(e.p)}</label>`).join('')+`<button id=checkDisc>Check</button><div id=discOut class=small></div>`;}
if(S.mode==='cross'){const cards=[['object-level','spatial-change'],['object-level','color-change'],['pixel-level','color-change'],['pixel-level','spatial-change']];return `<h3>Cross-classification</h3><p>Classify each card by axes: object/pixel × color/spatial.</p>`+cards.map((c,i)=>`<div class=card>Card ${i+1}: ${c[0]} + ${c[1]} <select id=cc${i}><option>object+color</option><option>object+spatial</option><option>pixel+color</option><option>pixel+spatial</option></select></div>`).join('')+`<button id=checkCC>Check</button><div id=ccOut class=small></div>`;}
if(S.mode==='recognize'){const choices=['recolor','move','copy','crop/extract','complete/fill','count','mirror/rotate','scale/expand','unknown/compound'];return `<h3>Recognizing relationships</h3><p>Pick most likely relation type (practice label; not guaranteed ground truth for ARC).</p><select id=relSel>${choices.map(c=>`<option>${c}</option>`)}</select><textarea id=relWhy rows=3 style='width:100%' placeholder='Why this relation?'></textarea><button id=subRel>Save label</button><div id=relOut class=small></div>`;}
if(S.mode==='differentiate'){const same='recolor',odd='move';const order=[same,same,odd,same].sort(()=>Math.random()-.5);S.diffOdd=order.indexOf(odd);return `<h3>Differentiating relationships</h3><p>Three cards share a relation; one differs.</p>`+order.map((r,i)=>`<label class=card><input type=radio name=dr value=${i}> Card ${i+1}: relation behaves like <b>${r}</b></label>`).join('')+`<button id=checkDR>Check</button><div id=drOut class=small></div>`;}
return `<h3>System construction</h3><p>Construct the test output manually. Exact check compares grids only.</p><div class=row><button id=copyShape>Copy test input shape</button><button id=clearEd>Clear</button><label>Rows <input id=rows type=number min=1 max=30 value=${S.editor.grid.length}></label><label>Cols <input id=cols type=number min=1 max=30 value=${S.editor.grid[0].length}></label><button id=resizeEd>Resize</button></div><div class=palette>${ARC_COLORS.map((c,i)=>`<div data-c=${i} class='sw ${S.editor.color===i?'sel':''}' style='background:${c}' title='${i}'></div>`).join('')}</div><div style='margin:8px 0'>${nodeToHtml(renderGrid(S.editor.grid,true))}</div><button id=checkSys>Check exact output</button><div id=sysOut class=small></div>`;}
function bindTop(){el('loadBtn').onclick=async()=>{const files=[...el('filePick').files,...el('dirPick').files];let count=0;for(const f of files){if(!f.name.endsWith('.json'))continue;try{const j=JSON.parse(await f.text());if(j.train&&j.test){S.tasks.push({id:f.name,source:'import',...j});count++;}}catch{}}alert(`Imported ${count} tasks`);render()};el('randBtn').onclick=()=>{S.idx=Math.floor(Math.random()*S.tasks.length);S.sessionStart=Date.now();if(S.mode==='system')initEditor();render();};}
function bindMode(){
if(S.mode==='generalization')el('subGen').onclick=()=>{addJournal({correct:null,explain:el('hyp').value,errorType:'failed to test all examples',notes:'metacognitive checklist shown'});el('genOut').innerHTML='Checklist: explain every train example? specify relevant objects? separate relevant/irrelevant attributes? predict test output?';render()};
if(S.mode==='discrimination')el('checkDisc').onclick=()=>{const v=[...document.querySelectorAll('input[name=disc]')].find(x=>x.checked);if(!v)return;const ok=Number(v.value)===S.discAnswer;addJournal({correct:ok,explain:'discrimination choice',errorType:ok?'other':'ignored relevant attribute',notes:''});el('discOut').innerHTML=ok?'<span class=success>Correct.</span>':'<span class=error>Incorrect.</span> Corrupted pair was '+(S.discAnswer+1)};
if(S.mode==='cross')el('checkCC').onclick=()=>{const ans=['object+spatial','object+color','pixel+color','pixel+spatial'];let ok=true;ans.forEach((a,i)=>{if(el('cc'+i).value!==a)ok=false});addJournal({correct:ok,explain:'cross classification',errorType:ok?'other':'surface-feature trap',notes:''});el('ccOut').innerHTML=ok?'<span class=success>Correct.</span>':'<span class=error>Incorrect.</span> Compare both axes jointly.'};
if(S.mode==='recognize')el('subRel').onclick=()=>{addJournal({correct:null,explain:el('relSel').value+' | '+el('relWhy').value,errorType:'other',notes:'relation-label practice'});el('relOut').textContent='Saved. This is a practice label, not guaranteed ARC ground truth.';render()};
if(S.mode==='differentiate')el('checkDR').onclick=()=>{const v=[...document.querySelectorAll('input[name=dr]')].find(x=>x.checked);if(!v)return;const ok=Number(v.value)===S.diffOdd;addJournal({correct:ok,explain:'odd relation',errorType:ok?'other':'ignored relevant relation',notes:''});el('drOut').innerHTML=ok?'<span class=success>Correct.</span>':'<span class=error>Incorrect.</span> Odd card was '+(S.diffOdd+1)+'. Shared relation: recolor; odd: move.'};
if(S.mode==='system'){document.querySelectorAll('.sw').forEach(s=>s.onclick=()=>{S.editor.color=Number(s.dataset.c);render()});el('copyShape').onclick=()=>{const i=task().test[0].input;S.editor.grid=i.map(r=>[...r]);render()};el('clearEd').onclick=()=>{S.editor.grid=S.editor.grid.map(r=>r.map(()=>0));render()};el('resizeEd').onclick=()=>{const r=+el('rows').value,c=+el('cols').value;const ng=Array.from({length:r},(_,ri)=>Array.from({length:c},(_,ci)=>S.editor.grid[ri]?.[ci]??0));S.editor.grid=ng;render()};el('checkSys').onclick=()=>{const gt=task().test[0].output;const ok=gt?gridEq(S.editor.grid,gt):null;addJournal({correct:ok,explain:'manual output construction',errorType:ok?'other':'wrong output construction',notes:''});el('sysOut').innerHTML=ok===null?'No test output available for exact check.':ok?'<span class=success>Exact match.</span>':'<span class=error>Not exact match.</span>';};}
}
function statsHtml(){const total=Object.values(S.stats).reduce((a,b)=>a+b.attempts,0);const cor=Object.values(S.stats).reduce((a,b)=>a+b.correct,0);const checkable=Object.values(S.stats).reduce((a,b)=>a+b.correct+Math.max(0,b.attempts-b.correct),0);const err={};S.journal.forEach(j=>err[j.errorType]=(err[j.errorType]||0)+1);const common=Object.entries(err).sort((a,b)=>b[1]-a[1]).slice(0,3).map(e=>e[0]+' ('+e[1]+')').join(', ')||'n/a';return `<h3>Statistics</h3><dl class=stats><dt>Total attempts</dt><dd>${total}</dd><dt>Objective accuracy</dt><dd>${checkable?Math.round(cor/checkable*100):0}%</dd><dt>Attempts by mode</dt><dd>${MODES.map(m=>m.name+': '+S.stats[m.key].attempts).join('<br>')}</dd><dt>Common error types</dt><dd>${common}</dd></dl>`}
function journalHtml(){return `<h3>Error Journal</h3><div class=row><select id=errType>${ERROR_TYPES.map(e=>`<option>${e}</option>`)}</select><input id=errNotes placeholder='notes'></div><div class=small>Journal entries: ${S.journal.length}</div>`}
render();
</script>
</body></html>
